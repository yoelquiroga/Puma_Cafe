<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ENCUENTRANOS</title>
<link rel="stylesheet" href="/css/encuentranos.css" />
<link href="//cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">
</head>
<body>
	<!-- HEADER --- NAVBAR -->
	<div th:insert="~{usuario/headerFooter.html::header}"></div>






	<!-- ENCUENTRANOS / FORMULARIO -->
	<div class="content-form">
		<!-- Lado izquierdo: Encuéntranos y botón de llamada -->
		<div class="left-content">
			<span class="encuentranos">Encuéntranos</span>
			<div class="description">Estamos a un click de distancia.</div>
			<a href="#" class="call-btn">Llámanos al 984 247 724</a>
		</div>

		<!-- Lado derecho: el formulario -->
		<div class="right-content">
			<div class="container-form">
				<form th:action="@{/guardarEncuentranos}" method="post">
					<div class="form-group">
						<span>Nombre</span> <input type="text"
							placeholder="Ingrese nombre" name="nombre"/>
					</div>
					<div class="form-group">
						<span>Apellido</span> <input type="text"
							placeholder="Ingrese apellido" name="apellido"/>
					</div>
					<div class="form-group">
						<span>Email</span> <input type="email" placeholder="Ingrese email" name="email"/>
					</div>
					<div class="form-group">
						<span>Teléfono</span> <input type="text"
							placeholder="Ingrese teléfono" name="telefono"/>
					</div>
					<div class="form-group full-width">
						<span>Mensaje</span>
						<textarea name="mensaje" id="mensaje"></textarea>
					</div>

					<div class="button">
						<button type="submit">Enviar mensaje</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<!----- Mapa ----->

	<section class="seccion-mapa">
		<div class="titulo-mapa">
			<h1>Encuéntranos</h1>
		</div>
		<div class="mapa">
			<iframe
				src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3901.5174601792223!2d-77.0366626!3d-12.076685999999999!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9105c8f25a0767bf%3A0xdfdcd14bd0e23638!2sAv.%20Gral.%20Antonio%20Alvarez%20de%20Arenales%201199%2C%20Lima%2015046!5e0!3m2!1ses!2spe!4v1681830021899!5m2!1ses!2spe"
				width="100%" height="500" style="border: 0;" allowfullscreen=""
				loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
		</div>
	</section>






	<!-- FOOTER -->

	<div th:insert="~{usuario/headerFooter.html::footer}"></div>




	<script src="https://kit.fontawesome.com/2f754fe3e7.js" crossorigin="anonymous"></script>
	<script src="/js/carrito.js"></script>
	<script th:if="${contactoExitoso}">
	showToast('¡Mensaje enviado con éxito! Nos pondremos en contacto contigo pronto.', 'success', 3000);
	</script>
</body>
</html>
