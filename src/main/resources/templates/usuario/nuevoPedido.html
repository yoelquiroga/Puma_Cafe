<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Realizar Pedido</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

</head>

<style>
	@import url("https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700&display=swap");

	:root {
		--primary-color: #efefef;
		--navbar-color: #c7a17a;
		--background-color: #0f0f0f;
		--dark-color: #151515;

		--black: #130f40;
		--light-color: #666;
		--box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
		--border: 0.2rem solid rgba(0, 0, 0, 0.1);
		--outline: 0.1rem solid rgba(0, 0, 0, 0.1);
		--outline-hover: 0.2rem solid var(var(--black));
	}

	* {
		font-family: "Poppins", sans-serif;
		margin: 0;
		padding: 0;
		box-sizing: border-box;
		outline: none;
		border: none;
		text-decoration: none;
		text-transform: capitalize;
		transition: all 0.2s linear;
	}

	html {
		font-size: 62.5%;
		overflow-x: hidden;
		scroll-behavior: smooth;
		scroll-padding-top: 7rem;
	}




	/* body {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    padding: 10px;
} */

	/* ********************************** */
	/*             UTILIDADES             */
	/* ********************************** */
	.container {
		max-width: 120rem;
		margin: 0 auto;
	}

	/*HEADER*/
	.header {
		position: fixed;
		top: 0;
		left: 0;
		right: 0;
		z-index: 1000;
		display: grid;
		grid-template-columns: auto 1fr auto;
		align-items: center;
		padding: 5px 20px;
		width: 100%;

		background: #151515;
		box-shadow: var(--box-shadow);
	}

	.logo img {
		height: auto;
		max-width: 100%;
		margin-left: 30px;
	}

	.header .navbar {
		justify-self: center;
		display: flex;
		justify-content: center;
		gap: 2rem;
		width: 100%;
	}

	.header .navbar a {
		font-size: 1.7rem;
		margin: 0 1rem;
		color: var(--primary-color);
		text-decoration: none;
	}

	.header .navbar a:hover {
		color: #14ff72cb;
	}

	.header .icons .fas {
		height: 4.5rem;
		width: 4.5rem;

		line-height: 4.5rem;
		border-radius: 0.5rem;
		background: #eee;
		color: var(--black);
		font-size: 2rem;
		margin-left: 0.3rem;
		cursor: pointer;
		text-align: center;
		justify-self: end;

		position: relative;
	}

	/* contador de productos */
	.count-products {
		position: absolute;
		top: 8%;

		/* bottom: 10%; */
		margin-left: 25px;
		background-color: rgb(183, 36, 36);
		color: #fff;
		width: 17px;
		height: 17px;

		display: flex;
		justify-content: center;
		align-items: center;
		border-radius: 50%;
		z-index: 10;
	}

	#contador-productos {
		font-size: 12px;
		color: #fff;
		font-weight: 500;
		z-index: 11;
		position: relative;
		/* top: 20%; */
		/* bottom: 5%; */
		right: 5%;
	}

	/* carrito */
	.cart {
		position: fixed;
		top: 0;
		right: 0;
		right: -100%;
		/* width: 360px; */
		width: 400px;
		height: 100vh;
		/* height: auto; */
		overflow-y: auto;
		overflow-x: hidden;
		padding: 20px;
		background-color: #f3f3f3;
		box-shadow: -2px solid 4px hsl(0 4% 15% / 10%);
		border: 1px solid #000;
		transition: 1.7s;
		z-index: 12;
	}

	.cart.active {
		right: 0;
		transition: 0.5s;
	}

	.cart-title {
		text-align: center;
		/* font-size: 1.5rem; */
		font-size: x-large;
		font-weight: 600;
		margin-top: 2rem;
	}

	.cart-box {
		display: grid;
		grid-template-columns: 32% 50% 18%;
		align-items: center;
		gap: 1rem;
		color: #333;
		/* margin-top: 1rem; */
		border-bottom: 1px solid rgba(0, 0, 0, 0.105);
		cursor: pointer;
	}

	.cart-box:hover {
		background-color: rgba(0, 0, 0, 0.105);
	}

	.cart-box:hover span {
		color: #777;
	}

	.cart-img {
		width: 100px;
		height: 100px;
		object-fit: contain;
		padding: 10px;
	}

	.detail.box {
		display: grid;
		row-gap: 0.5rem;
	}

	.cart-product-title {
		font-size: 15px;
		text-transform: uppercase;

		display: block;
		font-weight: 600;
		margin-bottom: 10px;
	}

	.selector-cantidad {
		display: inline-block;
		margin-right: 25px;
	}

	.selector-cantidad i {
		font-size: 18px;
		width: 32px;
		height: 32px;
		line-height: 32px;
		text-align: center;
		border-radius: 50%;
		border: 1px solid #000;
		cursor: pointer;
	}

	.cart-price {
		font-weight: 500;
		display: inline-block;
		font-size: 15px;
		margin-bottom: 5px;
	}

	.carrito-item-cantidad {
		border: none;
		font-size: 35px;
		background-color: transparent;
		display: inline-block;
		width: 160px;
		padding: 5px;
		text-align: center;
	}

	.cart-quantity {
		/* border: 1px solid #000; */
		/* outline-color: #106e33; */
		/* width: 1.4rem; */
		width: 32px;
		text-align: center;
		/* font-size: 1rem; */
		font-size: 16px;
	}

	.cart-remove {
		font-size: 24px;
		color: #000;
		cursor: pointer;
	}

	.cart-remove:hover {
		color: rgb(183, 36, 36);
	}

	.total {
		display: flex;
		justify-content: flex-end;
		margin-top: 1px solid #fff;
		border-top: 1px solid #000;
	}

	.total-title {
		/* font-size: 1rem; */
		font-size: medium;
		font-weight: 600;
	}

	.total-price {
		margin-left: 0.5rem;
		font-size: medium;
	}

	.btn-buy {
		display: flex;
		margin: 1.5rem auto 0 auto;
		padding: 12px 20px;
		border: none;
		background-color: #106e33;
		color: #fff;
		/*font-size: 1rem;
    */
		font-size: medium;
		font-weight: 500;
		cursor: pointer;
		transition: 0.4s;
	}

	.btn-buy:hover {
		background-color: #7db928;
		color: #000;
	}

	#cart-close {
		position: absolute;
		top: 1rem;
		right: 0.8rem;
		font-size: 2rem;
		color: #0f0f0f;
		cursor: pointer;
	}

	.cart-empty {
		padding: 20px;
		text-align: center;
	}

	.hidden-cart {
		display: none;
	}

	/* --- */

	.header .icons .fas:hover {
		/* background: #14ff72cb; */
		color: #777;
	}

	#menu-btn {
		display: none;
	}

	.header .search-form {
		position: absolute;
		top: 110%;
		right: -110%;
		width: 50rem;
		height: 5rem;
		background: #fff;
		border-radius: 0.5rem;
		overflow: hidden;
		display: flex;
		align-items: center;
		box-shadow: var(--box-shadow);
	}

	.header .search-form.active {
		right: 2rem;
		transition: 0.4s linear;
	}

	.header .search-form input {
		height: 100%;
		width: 100%;
		background: none;
		text-transform: none;
		font-size: 1.6rem;
		color: var(--black);
		padding: 0 1.5rem;
	}

	.header .search-form label {
		font-size: 2.2rem;
		padding-right: 1.5rem;
		color: var(--black);
		cursor: pointer;
	}

	.header .search-form label:hover {
		color: var(--orange);
	}

	/*------------------------------ DE FORMULARIO ------------------------------*/



	h2 {
		display: block;
		visibility: visible;
		text-align: center;
		margin-top: 25px;
		color: black;
		margin-top: 100px;
		font-family: sans-serif;
		font-size: 30px;
	}

	/* Estilo para ambas tablas */
	table {
		width: 50%;
		/* Ancho del 60% */
		border-collapse: collapse;
		margin: 0 auto;
		/* Centrado horizontal */
	}

	/* Tabla superior: margen superior de 50px */

		margin-top: 50px;
	}

	/* Tabla del formulario: margen inferior de 50px */
	table.class-form {
		margin-bottom: 50px;
		margin-top: 30px;
	}

	th,
	td {
		border: 1px solid #ddd;
		padding: 8px;
		text-align: left;
	}

	th {
		background-color: #f2f2f2;
		font-weight: bold;
	}

	/* Borde superior más grueso y verde */
	table th:first-child,
	table th:last-child {
		border-top: 4px solid #4CAF50;
	}

	input,
	select {
		width: 100%;
		padding: 8px;
		box-sizing: border-box;
	}



	/* Contenedor del formulario y botón centrados */

		width: 100%;
		/* Ancho del formulario */
		display: flex;
		flex-direction: column;
		align-items: center;
		/* Centrar el contenido horizontalmente */

		/* Espacio entre los elementos */
		margin-bottom: 100px;
	}

	/* Botón de pedido */

		background-color: white;
		border: 2px solid #39FF14;

		color: black;

		padding: 10px 20px;
		cursor: pointer;
		font-size: 10px;
		width: 20%;
		/* Ajuste del ancho del botón */

	}

		background-color: #39FF14;
		color: white;
	}

	/* --- */
	.information ul li a {

		font-weight: 300;
		display: flex;
		align-items: center;
		gap: 0.5rem;

	.information ul li a i {

	}

	}

	.social-icons {
		display: flex;

	}

	.social-icons span {

    height: 4rem; */

	}

	.social-icons span i {
		color: #7db928;

	.content p {
		font-size: 1.4rem;
		color: #fff;
		font-weight: 300;
	}

	.content input {
		outline: none;
		background: none;
		border: none;

		cursor: pointer;

	/* boton enviar */
	.bt {
		border: none;
		-webkit-user-select: none;
		-moz-user-select: none;
		-ms-user-select: none;
		user-select: none;
		font-size: 18px;
		color: white;
		text-align: center;
		background-color: #7db928;

		-webkit-transition: all 0.2s ease;

	}

	.msg {
		height: 0;
		width: 0;
		border-radius: 2px;
		position: absolute;
		left: 15%;
		top: 25%;
	}

	.bt:active {
		-webkit-transition: all 0.001s ease;
		transition: all 0.001s ease;
		background-color: #bee08f;
		-webkit-box-shadow: #97989a 0 0 0 0;
		box-shadow: #97989a 0 0 0 0;
		-webkit-transform: translateX(1px) translateY(1px);
		-ms-transform: translateX(1px) translateY(1px);
		transform: translateX(1px) translateY(1px);
	}

	.bt:hover .msg {
		-webkit-animation: msgRun 2s forwards;
		animation: msgRun 2s forwards;
	}

	@-webkit-keyframes msgRun {
		0% {
			border-top: #d6d6d9 0 solid;
			border-bottom: #f2f2f5 0 solid;
			border-left: #f2f2f5 0 solid;

		}

		20% {

		}

		100% {

			border-left: transparent 18px solid;
			border-right: transparent 18px solid;
		}
	}

	@keyframes msgRun {
		0% {
			border-top: #d6d6d9 0 solid;
			border-bottom: #f2f2f5 0 solid;
			border-left: #f2f2f5 0 solid;
			border-right: #f2f2f5 0 solid;
		}

		20% {
			border-top: #d6d6d9 14px solid;
			border-bottom: #f2f2f5 14px solid;

<body>

	<!-- HEADER --- NAVBAR -->
	<div th:insert="~{usuario/headerFooter.html::header}"></div>



	<h2>Tu pedido</h2>

	<div id="cart-empty-msg" style="display:none; text-align:center; margin: 20px; font-size: 18px; color: #666;">
		Tu carrito está vacío. <a th:href="@{/tienda}">Ir a la tienda</a>
	</div>

	<table id="tabla-pedido">
		<thead>
			<tr>
				<th>Producto</th>
				<th>Precio Unit.</th>
				<th>Sub Total</th>
			</tr>
		</thead>
		<tbody id="pedido-items">
		</tbody>
		<tfoot>
			<tr>
				<th colspan="2">Total</th>
				<th id="total-pedido">S/ 0.00</th>
			</tr>
		</tfoot>
	</table>

	<form action="/guardarPedido" method="POST">
		<input type="hidden" name="cartData" id="cartData">
		<table class="class-form">
			<tr>
				<td>Fecha :</td>
				<td><input type="date" name="fecha" id="fecha-pedido" readonly></td>
			</tr>
			<tr>
			    <td>Método de Pago</td>
			    <td>
			        <select name="metodoPago" required>
			            <option value="">Seleccione método de pago</option>
			            <option value="TARJETA_CREDITO">TARJETA CREDITO</option>
			            <option value="EFECTIVO">EFECTIVO</option>
			        </select>
			    </td>
			</tr>
			<tr>
				<td>Dirección de Entrega</td>
				<td><input type="text" name="direccionEntrega" placeholder="Ingrese su dirección" required></td>
			</tr>
		</table>
		<button type="submit" id="realizar-pedido">FINALIZAR COMPRA</button>
	</form>



	<!-- FOOTER -->

	<div th:insert="~{usuario/headerFooter.html::footer}"></div>


	<script src="https://kit.fontawesome.com/2f754fe3e7.js" crossorigin="anonymous"></script>
	<script src="/js/carrito.js"></script>
	<script>
		document.addEventListener("DOMContentLoaded", function() {
			const tbody = document.getElementById('pedido-items');
			const totalEl = document.getElementById('total-pedido');
			const cartDataInput = document.getElementById('cartData');
			const emptyMsg = document.getElementById('cart-empty-msg');
			const form = document.querySelector('form');
			const fechaInput = document.getElementById('fecha-pedido');

			// Fecha actual
			const hoy = new Date().toISOString().split('T')[0];
			fechaInput.value = hoy;

			// Leer carrito desde localStorage
			let items = JSON.parse(localStorage.getItem('cartItems')) || [];

			if (items.length === 0) {
				document.getElementById('tabla-pedido').style.display = 'none';
				form.style.display = 'none';
				emptyMsg.style.display = 'block';
				return;
			}

			let total = 0;

			items.forEach(function(item) {
				let qty = item.quantity || 1;
				let subtotal = item.price * qty;
				total += subtotal;
				let tr = document.createElement('tr');
				let td1 = document.createElement('td');
				td1.textContent = item.title + ' \u00D7 ' + qty;
				let td2 = document.createElement('td');
				td2.textContent = 'S/ ' + item.price.toFixed(2);
				let td3 = document.createElement('td');
				td3.textContent = 'S/ ' + subtotal.toFixed(2);
				tr.appendChild(td1);
				tr.appendChild(td2);
				tr.appendChild(td3);
				tbody.appendChild(tr);
			});
			totalEl.textContent = 'S/ ' + total.toFixed(2);

			// Serializar carrito en campo oculto (solo id y cantidad)
			const cartPayload = items.map(function(item) {
				return { id: item.id, quantity: item.quantity || 1 };
			});
			cartDataInput.value = JSON.stringify(cartPayload);

			// Al enviar, limpiar localStorage
			form.addEventListener('submit', function() {
				localStorage.removeItem('cartItems');
			});
		});
	</script>

</body>

</html>
