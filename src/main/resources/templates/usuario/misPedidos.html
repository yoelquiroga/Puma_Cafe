<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Pedidos - Puma Café</title>
<link rel="stylesheet" href="/css/tienda.css" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
	integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
<link href="https://cdn.datatables.net/2.0.3/css/dataTables.bootstrap5.css" rel="stylesheet">
<style>
	body { background-color: #f8f9fa; color: #000; }
	.main-container { max-width: 1200px; margin: 120px auto 40px; padding: 0 20px; }
	h2 { text-align: center; margin-bottom: 30px; color: #151515; font-weight: 600; font-size: 2.5rem; }
	.table { color: #000; font-size: 1.4rem; }
	.table thead th { background-color: #151515 !important; color: #fff !important; font-weight: 500; }
	.table tbody td { color: #000; }
	.badge-pendiente { background-color: #ffc107; color: #000; padding: 5px 10px; border-radius: 4px; font-size: 1.2rem; }
	.badge-en_ruta { background-color: #0d6efd; color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 1.2rem; }
	.badge-entregado { background-color: #198754; color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 1.2rem; }
	.badge-cancelado { background-color: #dc3545; color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 1.2rem; }
	.btn-detalle { background-color: #c7a17a; border: none; color: #fff; font-size: 1.2rem; }
	.btn-detalle:hover { background-color: #a8885e; color: #fff; }
	.alert-success { max-width: 600px; margin: 100px auto 0; font-size: 1.4rem; }
	.dataTables_wrapper { font-size: 1.3rem; color: #000; }
	.dataTables_wrapper .dataTables_info, 
	.dataTables_wrapper .dataTables_length, 
	.dataTables_wrapper .dataTables_filter, 
	.dataTables_wrapper .dataTables_paginate { color: #000; }
	.dataTables_wrapper .dataTables_paginate .paginate_button {
		padding: 0 !important;
		margin: 0 2px !important;
		border: none !important;
	}
	.dataTables_wrapper .dataTables_paginate .paginate_button .page-link {
		padding: 4px 10px !important;
		border: 1px solid #ccc !important;
		border-radius: 4px !important;
		font-size: 1.2rem !important;
		line-height: 1.4 !important;
		color: #333 !important;
		background: #fff !important;
	}
	.dataTables_wrapper .dataTables_paginate .paginate_button.active .page-link {
		background: #151515 !important;
		color: #fff !important;
		border-color: #151515 !important;
	}
	.dataTables_wrapper .dataTables_paginate .paginate_button .page-link:hover {
		background: #c7a17a !important;
		color: #fff !important;
		border-color: #c7a17a !important;
	}
	.header .icons { display: flex; align-items: center; }
	.header .navbar a { text-decoration: none !important; }
	.btn-buy {
		display: block !important;
		width: 100% !important;
		background-color: #106e33 !important;
		color: #fff !important;
		font-weight: 600 !important;
		padding: 12px 20px !important;
		border-radius: 0.5rem !important;
		text-align: center !important;
		text-decoration: none !important;
		font-size: 1.4rem !important;
		margin: 1.5rem auto 0 auto !important;
		border: none !important;
	}
	.btn-buy:hover { background-color: #7db928 !important; color: #fff !important; }
	footer { margin-top: 60px; }
</style>
</head>
<body>

	<div th:replace="~{usuario/headerFooter :: header}"></div>

	<div th:if="${param.success}" class="alert alert-success text-center" role="alert">
		Pedido creado exitosamente
	</div>

	<div class="main-container">
		<h2>Mis Pedidos</h2>

		<div th:if="${#lists.isEmpty(pedidos)}" class="text-center" style="padding: 60px 20px; color: #666; font-size: 1.6rem;">
			<p>No tienes pedidos aún.</p>
			<a th:href="@{/tienda}" class="btn btn-success mt-3">Ir a la tienda</a>
		</div>

		<div th:unless="${#lists.isEmpty(pedidos)}" class="table-responsive">
			<table class="table table-bordered" id="dataTable" width="100%">
				<thead>
					<tr>
						<th>N° Pedido</th>
						<th>Fecha</th>
						<th>Total</th>
						<th>Método de Pago</th>
						<th>Dirección</th>
						<th>Estado</th>
						<th>Acción</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="pedido : ${pedidos}">
						<td th:text="${pedido.idPedidos}"></td>
						<td th:text="${#dates.format(pedido.fecha, 'dd/MM/yyyy')}"></td>
						<td th:text="'S/ ' + ${#numbers.formatDecimal(pedido.total, 1, 2)}"></td>
						<td th:text="${pedido.metodoPago}"></td>
						<td th:text="${pedido.direccionEntrega}"></td>
						<td>
							<span th:if="${pedido.estado != null and pedido.estado.name() == 'PENDIENTE'}" class="badge-pendiente">PENDIENTE</span>
							<span th:if="${pedido.estado != null and pedido.estado.name() == 'EN_RUTA'}" class="badge-en_ruta">EN RUTA</span>
							<span th:if="${pedido.estado != null and pedido.estado.name() == 'ENTREGADO'}" class="badge-entregado">ENTREGADO</span>
							<span th:if="${pedido.estado != null and pedido.estado.name() == 'CANCELADO'}" class="badge-cancelado">CANCELADO</span>
						</td>
						<td>
							<a th:href="@{/detallePedido/{id}(id=${pedido.idPedidos})}" class="btn btn-detalle btn-sm">Ver Detalle</a>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

	<div th:replace="~{usuario/headerFooter :: footer}"></div>

	<script src="https://kit.fontawesome.com/2f754fe3e7.js" crossorigin="anonymous"></script>
	<script>
		if (window.location.search.includes('success')) {
			localStorage.removeItem('cartItems');
		}
	</script>
	<script src="/js/carrito.js"></script>
	<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous">
	</script>
	<script src="https://cdn.datatables.net/2.0.3/js/dataTables.js"></script>
	<script src="https://cdn.datatables.net/2.0.3/js/dataTables.bootstrap5.js"></script>
	<script th:inline="none">
		$(document).ready(function() {
			$('#dataTable').DataTable({
				language: {
					url: 'https://cdn.datatables.net/plug-ins/2.0.3/i18n/es-ES.json'
				},
				order: [[0, 'desc']]
			});
		});
	</script>
</body>
</html>
