<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalle del Pedido - Puma Café</title>
<link rel="stylesheet" href="/css/tienda.css" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
	integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
<style>
	body { background-color: #f8f9fa; color: #000; }
	.main-container { max-width: 900px; margin: 120px auto 40px; padding: 0 20px; }
	h2 { text-align: center; margin-bottom: 30px; color: #151515; font-weight: 600; font-size: 2.5rem; }
	.card { border: none; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1); margin-bottom: 20px; }
	.card-header { background-color: #151515; color: #efefef; font-weight: 600; font-size: 1.8rem; }
	.card-body { color: #000; font-size: 1.5rem; }
	.table { color: #000; font-size: 1.4rem; }
	.table thead th { background-color: #151515 !important; color: #fff !important; font-weight: 500; }
	.table tbody td { color: #000; }
	.label { font-weight: 600; color: #333; }
	.badge-pendiente { background-color: #ffc107; color: #000; padding: 5px 10px; border-radius: 4px; font-size: 1.2rem; }
	.badge-en_ruta { background-color: #0d6efd; color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 1.2rem; }
	.badge-entregado { background-color: #198754; color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 1.2rem; }
	.badge-cancelado { background-color: #dc3545; color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 1.2rem; }
	.btn-volver { background-color: #c7a17a; border: none; color: #fff; padding: 10px 30px; font-size: 1.4rem; }
	.btn-volver:hover { background-color: #a8885e; color: #fff; }
	.btn-boleta { background-color: #2e7d32; border: none; color: #fff; padding: 10px 30px; font-size: 1.4rem; text-decoration: none; border-radius: 0.375rem; display: inline-flex; align-items: center; gap: 8px; }
	.btn-boleta:hover { background-color: #1b5e20; color: #fff; }
	.info-label { font-size: 1.5rem; margin-bottom: 8px; color: #000; }
	.info-label .label { font-size: 1.5rem; color: #333; }
	.header .icons { display: flex; align-items: center; }
	.header .navbar a { text-decoration: none !important; }
	.btn-buy {
		display: block !important;
		width: 100% !important;
		background-color: #106e33 !important;
		color: #fff !important;
		font-weight: 600 !important;
		padding: 12px 20px !important;
		border-radius: 0.5rem !important;
		text-align: center !important;
		text-decoration: none !important;
		font-size: 1.4rem !important;
		margin: 1.5rem auto 0 auto !important;
		border: none !important;
	}
	.btn-buy:hover { background-color: #7db928 !important; color: #fff !important; }
</style>
</head>
<body>

	<div th:replace="~{usuario/headerFooter :: header}"></div>

	<div class="main-container">
		<h2>Detalle del Pedido</h2>

		<div class="card">
			<div class="card-header">
				Pedido N° <span th:text="${pedido.idPedidos}"></span>
			</div>
			<div class="card-body">
				<div class="row mb-3">
					<div class="col-md-6">
						<p class="info-label"><span class="label">Fecha:</span> <span th:text="${#dates.format(pedido.fecha, 'dd/MM/yyyy')}"></span></p>
						<p class="info-label"><span class="label">Método de Pago:</span> <span th:text="${pedido.metodoPago}"></span></p>
					</div>
					<div class="col-md-6">
						<p class="info-label"><span class="label">Dirección de Entrega:</span> <span th:text="${pedido.direccionEntrega}"></span></p>
						<p class="info-label">
							<span class="label">Estado:</span>
							<span th:if="${pedido.estado != null and pedido.estado.name() == 'PENDIENTE'}" class="badge-pendiente">PENDIENTE</span>
							<span th:if="${pedido.estado != null and pedido.estado.name() == 'EN_RUTA'}" class="badge-en_ruta">EN RUTA</span>
							<span th:if="${pedido.estado != null and pedido.estado.name() == 'ENTREGADO'}" class="badge-entregado">ENTREGADO</span>
							<span th:if="${pedido.estado != null and pedido.estado.name() == 'CANCELADO'}" class="badge-cancelado">CANCELADO</span>
						</p>
					</div>
				</div>

				<h5 class="mt-4 mb-3" style="font-size: 1.8rem; font-weight: 600; color: #000;">Productos</h5>
				<div class="table-responsive">
					<table class="table table-bordered">
						<thead>
							<tr>
								<th>Producto</th>
								<th>Cantidad</th>
								<th>Precio Unitario</th>
								<th>Subtotal</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="detalle : ${detalles}">
								<td th:text="${detalle.producto.nombre}"></td>
								<td th:text="${detalle.cantidad}"></td>
								<td th:text="'S/ ' + ${#numbers.formatDecimal(detalle.precioUnitario, 1, 2)}"></td>
								<td th:text="'S/ ' + ${#numbers.formatDecimal(detalle.precioUnitario * detalle.cantidad, 1, 2)}"></td>
							</tr>
						</tbody>
						<tfoot>
							<tr>
								<th colspan="3" class="text-end">Total</th>
								<th th:text="'S/ ' + ${#numbers.formatDecimal(total, 1, 2)}"></th>
							</tr>
						</tfoot>
					</table>
				</div>

				<div class="text-center mt-4 d-flex flex-wrap justify-content-center gap-2">
					<a th:href="@{/misPedidos}" class="btn btn-volver">Volver a Mis Pedidos</a>
					<a th:href="@{/pedido/boleta/{id}(id=${pedido.idPedidos})}" class="btn btn-boleta" target="_blank">
						<i class="fas fa-file-invoice"></i> Boleta de Venta
					</a>
				</div>
			</div>
		</div>
	</div>

	<div th:replace="~{usuario/headerFooter :: footer}"></div>

	<script src="https://kit.fontawesome.com/2f754fe3e7.js" crossorigin="anonymous"></script>
	<script src="/js/carrito.js"></script>
	<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous">
	</script>
</body>
</html>
